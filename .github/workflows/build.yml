name: CondoApp Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
    - name: Checkout source code
      uses: actions/checkout@v3   # (có thể nâng lên @v4 nhưng @v3 vẫn OK)

    - name: Setup .NET 4.7.2 + MSBuild
      uses: microsoft/setup-msbuild@v1.3.1

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v1.2.0

    - name: Restore NuGet packages
      run: nuget restore WpfApp1.sln

    - name: Build the solution
      run: msbuild WpfApp1.sln /p:Configuration=Debug

    - name: Run MSTest unit tests
      run: |
        vstest.console.exe WpfApp1.Tests/bin/Debug/WpfApp1.Tests.dll /Logger:trx
      continue-on-error: true

    - name: Upload Test Results
      uses: actions/upload-artifact@v3
      with:
        name: TestResults
        path: '**/*.trx'
