name: build-and-test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore packages
        run: nuget restore WpfApp1.sln

      - name: Build solution (Debug)
        run: msbuild WpfApp1.sln /t:Build /p:Configuration=Debug /m

      - name: Run MSTest tests
        run: |
          & "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\IDE\Extensions\TestPlatform\vstest.console.exe" `
            "WpfApp1.Tests\bin\Debug\WpfApp1.Tests.dll" /Settings:Test.runsettings /Logger:trx

      - name: Generate HTML test report
        run: .\GenerateTestReport.ps1

      - name: Upload Test Results (.trx + .html)
        uses: actions/upload-artifact@v4
        with:
          name: TestResults
          path: Reports/TestResults/

      - name: Upload app binaries (optional)
        uses: actions/upload-artifact@v4
        with:
          name: WpfApp1-bin-Release
          path: WpfApp1/bin/Debug/
