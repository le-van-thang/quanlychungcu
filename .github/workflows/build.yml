name: CondoApp Build & Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: nuget restore WpfApp1.sln

      - name: Build solution (Debug)
        run: msbuild WpfApp1.sln /t:Build /p:Configuration=Debug /m


      # ============================
      #     RUN MSTest correctly
      # ============================
      - name: Run MSTest tests
        shell: pwsh
        run: |
          & "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\IDE\Extensions\TestPlatform\vstest.console.exe" `
            "WpfApp1.Tests\bin\Debug\WpfApp1.Tests.dll" `
            /Logger:trx
      

      # ============================
      # Generate test report (optional)
      # ============================
      - name: Generate HTML test report
        if: always()
        shell: pwsh
        run: |
          if (Test-Path "Reports\TestResults") {
            Write-Host "Report folder exists"
          } else {
            mkdir Reports\TestResults
          }


      # ============================
      # Upload test results
      # ============================
      - name: Upload Test Results (.trx)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TestResults
          path: |
            **/*.trx

      # ============================
      # Upload app binaries
      # ============================
      - name: Upload app binaries (optional)
        uses: actions/upload-artifact@v4
        with:
          name: WpfApp1-debug
          path: WpfApp1/bin/Debug/
